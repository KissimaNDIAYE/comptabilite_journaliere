<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{template}">
<head>
    <link rel="stylesheet" type="text/css"
          href="/webjars/bootstrap/4.3.1/css/bootstrap.min.css" />
    <meta charset="utf-8">
    <title>Ajouter un compte d’imputation</title>
</head>
<body>
    <div layout:fragment="Mycontent">
        <div class="container mt-5 col-md-12">
            <div class="card" style="border: 1px solid beige;">
                <span style="font-size: 1.5em; font-family: monospace; color: black; margin: auto;">Formulaire d'enregistrement d'un compte d’imputation</span>
            </div>
        </div>

        <div class="card-body">
            <center>
                <a class="btn btn-info" style="font-family: monospace; font-size: 1em;" th:href="@{showCreateCompteImputation}">Créer un compte</a>
                <a class="btn btn-info" style="font-family: monospace; font-size: 1em;" th:href="@{listeCompteImputation}">Liste des comptes</a>
            </center>
        </div>

        <form th:action="@{saveCompteImputation}" method="post">
            <div class="row" style="font-size: 0.9em">
                <div class="card col-6 inline-bloc">
                    <div class="card-header" th:if="${mode=='new'}">Nouveau compte d’imputation</div>
                    <div class="card-header" th:if="${mode=='edit'}">Modification du compte d’imputation</div>
                    <center>
                        <span style="font-size: 1.5em; color: green; margin: auto;" th:text="${succes}"></span>
                        <span style="font-size: 1.5em; color: red; margin: auto;" th:text="${erreurs}"></span>
                    </center>
                    <div class="card-body">
                        <div class="form-group">
                            <label class="control-label" hidden>ID :</label>
                            <input type="hidden" name="id" class="form-control" th:value="${compteimputation.id}" />
                        </div>
                        <div class="form-group">
                            <label class="control-label">Code du compte :</label>
                            <input type="text" name="code" class="form-control" th:value="${compteimputation.code}" />
                            <span th:errors="${compteimputation.code}" class="text-danger"></span>
                        </div>
                        <div class="form-group">
                            <label class="control-label">Libellé :</label>
                            <input type="text" name="libelle" class="form-control" th:value="${compteimputation.libelle}" />
                            <span th:errors="${compteimputation.libelle}" class="text-danger"></span>
                        </div>
                        <div>
                            <button type="submit" class="btn btn-primary">Valider</button>
                        </div>
                    </div>
                </div>

                <div class="card col-6 inline-bloc">
                    <div class="card-body">
                        <table class="table table-bordered table-striped">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Code</th>
                                    <th>Libellé</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="c : ${compteimputations}">
                                    <td th:text="${c.id}"></td>
                                    <td th:text="${c.code}"></td>
                                    <td th:text="${c.libelle}"></td>
                                    <td>
                                        <a class="btn btn-warning btn-sm" th:href="@{|/editCompteImputation/${c.id}|}">Modifier</a>
                                        <a class="btn btn-danger btn-sm" th:href="@{|/deleteCompteImputation/${c.id}|}" onclick="return confirm('Êtes-vous sûr ?');">Supprimer</a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </form>
    </div>
</body>
</html>
