                                        <option value="NARA">NARA</option>
                                    </select>
                                </div>

                            <div class="col-12">

                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Deuxième formulaire - Colonne de droite -->

                    <form th:action="@{/export/donnees}" method="get">

                                    </select>

                            </div>

                            <div class="col-12">
                                <div class="form-group">

                                    <select required="required" class="form-control" id="mois" name="mois">

                            </div>
                            <div class="col-12 mt-3">

                            </div>
                        </div>

                </div>
            </div>
        </div>
    </div>
</div>

    <!-- ------------------------------------------------------------------------------------------------ -->
    <!-- ------------------------------------------------------------------------------------------------ -->
    <!-- ------------------------------------------------------------------------------------------------ -->

        <div class="row" style="font-size: 0.8em">

            <div class="card col-12">
                <div class="card-body table-responsive">
                    <table class="table table-bordered table-striped table-sm" id="d1Table">
                        <thead>
                        <tr>
                            <!-- <th>ID</th> -->
                            <th>STRUCTURE</th>
                            <th>LOT</th>
                            <th>TYPE_LOT</th>
                            <th>CODE_LIGNE_IMP</th>
                            <th>CODE_IMPUT</th>
                            <th>LIBELLE_COMP_IMP</th>
                            <th>MOIS</th>
                            <th>ANNEE</th>
                            <th>CATEGORIE_IMPOT</th>
                            <th>BUDGET</th>
                            <th>MONTANT</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="t : ${mvConsolides}">
                            <!-- <td th:text="${t.id}"></td> -->
                            <td th:text="${t.structure}"></td>
                            <td th:text="${t.lot}"></td>
                            <td th:text="${t.typeLot}"></td>
                            <td th:text="${t.codeLigneImp}"></td>
                            <td th:text="${t.codeImput}"></td>
                            <td th:text="${t.libelleCompImp}"></td>
                            <td th:text="${t.mois}"></td>
                            <td th:text="${t.annee}"></td>
                            <td th:text="${t.categorieImpot}"></td>
                            <td th:text="${t.budget}"></td>
                            <td th:text="${t.montant}"></td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
</div>
    <!-- JavaScript - Une seule fois et à la fin du body -->
    <script src="webjars/jquery/3.5.1/jquery.min.js"></script>
    <script type="text/javascript" src="webjars/bootstrap/4.3.1/js/bootstrap.min.js"></script>
    <script src="https://cdn.datatables.net/1.11.5/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/colreorder/1.5.6/js/dataTables.colReorder.min.js"></script>
    
    <script>
        $(document).ready(function() {
            // Vérifier si le tableau existe avant d'initialiser DataTables
            if ($("#d1Table").length > 0) {
                $("#d1Table").DataTable({
                    colReorder: true,
                    columnDefs: [
                        {
                            targets: -1, // Dernière colonne
                            orderable: false, // Désactiver le tri pour la dernière colonne
                        }
                    ],
                });
            }
        });
    </script>
